  <script>const slider = document.querySelector('.slider');
    const leftArrow = document.querySelector('.left');
    const rightArrow = document.querySelector('.right');
    const indicatorParents = document.querySelector('.controls ul');
    var sectionIndex = 0;
    
    function setIndex() {
     
      document.querySelector('.controls .selected').classList.remove('selected')
      slider.style.transform = 'translate(' + (sectionIndex)  * -25 + '%)' ; 
      
    }
    
    document.querySelectorAll('.controls li').forEach(function(indicator, ind) {indicator.addEventListener('click',function() {
      sectionIndex = ind;
      setIndex();
        indicator.classList.add('selected');
    
     
      
    }); });
    
    rightArrow.addEventListener('click',function() { 
      sectionIndex = (sectionIndex < 3) ? sectionIndex + 1 : 3 ;
     indicatorParents.children[sectionIndex].classList.add('selected');
    setIndex();
      
    });
    
    leftArrow.addEventListener('click',function() { 
      sectionIndex = (sectionIndex > 0) ? sectionIndex - 1 : 0 ;
      indicatorParents.children[sectionIndex].classList.add('selected');
      setIndex();
      
    });</script>
<script>
  function openLightbox(imageSrc) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = imageSrc;
  
    // Désactiver le scroll en ajoutant une classe au body
    document.body.style.overflow = "hidden";
  }
  
  function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
  
    // Réactiver le scroll
    document.body.style.overflow = "auto";
  }
</script>
  

  <script> 
    
const navbar = document.querySelector('.navbar');


let lastScrollTop = 0; 

window.addEventListener('scroll', () => {
  
  let currentScroll = window.pageYOffset || document.documentElement.scrollTop;

  
  if (currentScroll > lastScrollTop) {
    navbar.classList.add('shrink'); 
  } else {
    navbar.classList.remove('shrink'); 
  }

  lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
});

  </script>
    <script>
  const button = document.getElementById("toggleButton");
  const label = button.querySelector(".label");
  const icon = button.querySelector(".icon");
  const email = "nassimmezoughi5@gmail.com"; 

  button.addEventListener("click", (event) => {
    event.preventDefault();

    label.style.opacity = 0;
    icon.style.opacity = 0; 

    setTimeout(() => {
      if (label.textContent === email) {
        
        label.textContent = "Mail";
        button.classList.remove("auto-width"); 
        icon.style.display = "flex"; 
      } else {
        label.textContent = email;
        button.classList.add("auto-width");
        icon.style.display = "none";
      }

      label.style.opacity = 1;
      icon.style.opacity = 1; 
    }, 300);
  });
    </script>
  <script>
   document.addEventListener("DOMContentLoaded", function () {
    const checkbox = document.querySelector(".checkbox");
    const menu = document.querySelector(".menu-items");
  
    checkbox.addEventListener("change", function () {
      if (checkbox.checked) {
        menu.classList.add("scrollable");
        document.body.classList.add("no-scroll");
      } else {
        menu.classList.remove("scrollable");
        document.body.classList.remove("no-scroll");
      }
    });
  });
  </script>
